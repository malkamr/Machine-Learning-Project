<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Churn Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #f5f5f7; }
        h1 { color: #1d1d1f; }
        form { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 14px; font-weight: 600; color: #333; }
        input, select { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { margin-top: 20px; width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #005ecb; }
        .result { margin-top: 20px; padding: 16px; border-radius: 10px; font-weight: 600; }
        .churn { background: #ffe5e5; color: #c00; }
        .stay { background: #e5ffe9; color: #0a0; }
    </style>
</head>
<body>
    <h1>Customer Churn Predictor</h1>
    <form action="/predict" method="post">
        <label>Credit Score</label>
        <input type="number" name="CreditScore" value="650" required>

        <label>Age</label>
        <input type="number" name="Age" value="35" required>

        <label>Tenure (years)</label>
        <input type="number" name="Tenure" value="5" required>

        <label>Balance</label>
        <input type="number" step="0.01" name="Balance" value="50000" required>

        <label>Number of Products</label>
        <input type="number" name="NumOfProducts" value="1" required>

        <label>Has Credit Card</label>
        <select name="HasCrCard">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Is Active Member</label>
        <select name="IsActiveMember">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Estimated Salary</label>
        <input type="number" step="0.01" name="EstimatedSalary" value="60000" required>

        <label>Geography</label>
        <select name="Geography">
            <option value="France">France</option>
            <option value="Germany">Germany</option>
            <option value="Spain">Spain</option>
        </select>

        <label>Gender</label>
        <select name="Gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <button type="submit">Predict Churn</button>
    </form>

    {% if result %}
    <div class="result {{ 'churn' if result.churn_prediction == 1 else 'stay' }}">
        {{ result.label }} ({{ (result.churn_probability * 100) | round(2) }}% churn probability)
    </div>
    {% endif %}
</body>
</html>
